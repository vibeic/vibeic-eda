name: release

# Build vibeic-eda from source (SHA-pinned forks) and push to Docker Hub + GHCR.
#
# Trigger: push a semver tag (e.g. `v0.2.5`) or run manually.
#
# NOTE on the runner: a full from-source build produces a ~26 GB image and takes 1-2 h.
# GitHub-hosted runners (14 GB disk, 6 h) CANNOT build this. Use a SELF-HOSTED runner with
# the label `vibeic-builder` (>= 60 GB free disk, >= 8 cores, docker + buildx). Register one
# under the vibeic org: Settings -> Actions -> Runners.

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to build/push (e.g. 0.2.5), no leading v"
        required: true

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  IMAGE: vibeic-eda
  PLATFORMS: linux/amd64          # add ,linux/arm64 once the base publishes an arm64 tag

jobs:
  build-and-push:
    runs-on: [self-hosted, vibeic-builder]
    timeout-minutes: 240
    permissions:
      contents: read
      packages: write               # GHCR push via GITHUB_TOKEN
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Derive version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            V="${{ github.event.inputs.version }}"
          else
            V="${GITHUB_REF_NAME#v}"
          fi
          echo "version=$V" >> "$GITHUB_OUTPUT"
          echo "Building version: $V"

      - name: Version-sync guard (VERSION + install docs must match the release tag)
        run: |
          python3 sync_image_version.py --check
          FILE_V="$(python3 sync_image_version.py --print)"
          if [ "$FILE_V" != "${{ steps.ver.outputs.version }}" ]; then
            echo "::error::VERSION file ($FILE_V) != release tag (${{ steps.ver.outputs.version }}). Run './sync_image_version.py --set ${{ steps.ver.outputs.version }}' and commit before tagging." >&2
            exit 1
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ env.PLATFORMS }}
          push: true
          provenance: false
          tags: |
            vibeic/${{ env.IMAGE }}:${{ steps.ver.outputs.version }}
            vibeic/${{ env.IMAGE }}:latest
            ghcr.io/vibeic/${{ env.IMAGE }}:${{ steps.ver.outputs.version }}
            ghcr.io/vibeic/${{ env.IMAGE }}:latest
          labels: |
            org.opencontainers.image.title=vibeic-eda
            org.opencontainers.image.version=${{ steps.ver.outputs.version }}
            org.opencontainers.image.source=https://github.com/vibeic/vibeic-eda
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Smoke test the pushed image (bare docker exec — no login shell)
        run: |
          IMG=vibeic/${{ env.IMAGE }}:${{ steps.ver.outputs.version }}
          docker pull "$IMG"
          C=$(docker run -d "$IMG" --skip sleep infinity)
          # Bare (non-login) exec must resolve every tool — this is the 0.2.12 PATH fix.
          docker exec "$C" yosys --version
          docker exec "$C" openroad -version
          docker exec "$C" iverilog -V | head -1
          docker exec "$C" netgen -batch quit
          docker rm -f "$C"
